<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Dashboard - FAPD</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .profile-header {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #764ba2 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="navbar-brand">FAPD Faculty</a>
        <div class="navbar-user">
            <span id="userEmail" style="font-weight: 500; color: var(--gray-700);">faculty@fapd.edu</span>
            <button onclick="handleLogout()" class="logout-btn">Sign Out</button>
        </div>
    </nav>

    <div class="dashboard-container">
        
        <div class="card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatarInitial">F</div>
                <div>
                    <h2 id="profileName" style="font-size: 1.5rem; margin-bottom: 0.25rem;">Loading...</h2>
                    <p id="profileDetails" style="color: var(--gray-700);">Department - Designation</p>
                </div>
            </div>
        </div>

        <div class="grid" style="margin-bottom: 2rem; grid-template-columns: 2fr 1fr;">
            
            <div class="card" style="margin-bottom: 0;">
                <div class="card-header">
                    <h2 style="font-size: 1.25rem;">Add New Performance</h2>
                </div>
                <form id="performanceForm">
                    <div class="grid" style="gap: 1rem;">
                        <div class="form-group">
                            <label>Academic Year</label>
                            <input type="text" id="acadYear" class="form-control" required placeholder="e.g., 2024-25">
                        </div>
                        <div class="form-group">
                            <label>Teaching Score (max 40)</label>
                            <input type="number" step="0.1" id="teachingScore" class="form-control" required max="40">
                        </div>
                        <div class="form-group">
                            <label>Research Score (max 30)</label>
                            <input type="number" step="0.1" id="researchScore" class="form-control" required max="30">
                        </div>
                        <div class="form-group">
                            <label>Publications Count</label>
                            <input type="number" id="pubCount" class="form-control" required>
                        </div>
                        <div class="form-group">
                            <label>Publications Score (max 20)</label>
                            <input type="number" step="0.1" id="pubScore" class="form-control" required max="20">
                        </div>
                        <div class="form-group">
                            <label>Other Score (max 10)</label>
                            <input type="number" step="0.1" id="otherScore" class="form-control" required max="10">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Remarks</label>
                        <textarea id="remarks" class="form-control" rows="2"></textarea>
                    </div>
                    <button type="submit" class="btn">Submit Performance</button>
                    <div id="perfMsg" style="margin-top: 1rem; font-weight: 500;"></div>
                </form>
            </div>

            <div class="card" style="margin-bottom: 0;">
                <div class="card-header">
                    <h2 style="font-size: 1.25rem;">Score History</h2>
                </div>
                <canvas id="scoreChart"></canvas>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h2 style="font-size: 1.25rem;">Performance Records</h2>
            </div>
            <div class="table-container">
                <table id="perfTable">
                    <thead>
                        <tr>
                            <th>Academic Year</th>
                            <th>Teaching</th>
                            <th>Research</th>
                            <th>Pubs (Count)</th>
                            <th>Other</th>
                            <th>Total Score</th>
                        </tr>
                    </thead>
                    <tbody id="perfTableBody">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/faculty.js"></script>
</body>
</html>
